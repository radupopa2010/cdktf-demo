# Local validation harness for the rust-demo image.
#
# Consumes the OCI image produced by `nix build .#rust-demo-image` (loaded
# into the local Docker daemon by `scripts/dev-up.sh`). NOT a from-source
# build — that would defeat the "same artifact local and cloud" guarantee.
#
# Usage:
#   ./scripts/dev-up.sh            # build with Nix, load, run, curl
#   ./scripts/dev-down.sh          # tear down
services:
  rust-demo:
    image: rust-demo:latest        # populated by `docker load < result`
    pull_policy: never             # never reach for a registry; image is local
    # Match the platform of the Nix-built image. dev-up.sh sets this to
    # linux/arm64 on Apple Silicon, linux/amd64 on x86 hosts. Without it,
    # Docker Desktop on macOS would default to linux/amd64 and you'd see
    # "exec format error" when running an arm64 binary.
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info
    # No healthcheck inside the container — the image is intentionally minimal
    # (no shell, no curl/wget). dev-up.sh polls /health from the host instead.
