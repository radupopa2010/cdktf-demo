apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-demo
  labels:
    app.kubernetes.io/name: rust-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rust-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rust-demo
    spec:
      containers:
        - name: rust-demo
          image: app-rust-demo:latest    # built by `docker compose build` inside minikube
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
