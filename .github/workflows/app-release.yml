name: app-release

# Triggered ONLY when a GitHub release is published. We deliberately do NOT
# also trigger on `push: tags v*` even though that's a common pattern —
# `gh release create vX.Y.Z` (or the GitHub UI) pushes the tag *and* fires
# release.published, so listening to both means two parallel runs racing
# for the tier-04 state lock. One trigger = one pipeline.
#
# Pipeline: resolve-tag → build (Nix + Cachix) → deploy (tier-04 cdktf) →
#           smoke-test (curl /version against the live ALB).

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

# Belt-and-braces: even if a future trigger adds a second event, only one
# release pipeline should be in flight at a time. cancel-in-progress=false
# queues; never abort a deploy mid-flight.
concurrency:
  group: app-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.t.outputs.image_tag }}
    steps:
      - id: t
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-tag
    uses: ./.github/workflows/app-build.yml
    with:
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}

  deploy:
    needs: [resolve-tag, build]
    uses: ./.github/workflows/tier-04-applications.yml
    with:
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      apply: true

  smoke-test:
    needs: [resolve-tag, deploy]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig for cdktf-demo-devnet
        run: |
          aws eks update-kubeconfig \
            --name cdktf-demo-devnet \
            --region ${{ vars.AWS_REGION }}

      - name: Smoke-test live deployment
        env:
          EXPECTED: ${{ needs.resolve-tag.outputs.image_tag }}
        shell: bash
        run: |
          set -eo pipefail
          # Run smoke-test; capture output to file AND show it live.
          # If the script exits non-zero, set -e will fail the step.
          ./scripts/smoke-test.sh "$EXPECTED" 2>&1 | tee live-version.log
          {
            echo "## Live deployment verified"
            echo ""
            echo '```'
            tail -n 20 live-version.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
